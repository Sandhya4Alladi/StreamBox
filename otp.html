<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <section class="wrapper" style="padding-top: 150px; padding-bottom: 250px;">
        <div class="container">
            <div class="col-sm-8 offset-sm-2 col-lg-6 offset-lg-3 col-xl-4 offset-xl-4 text-center">
                <div class="logo">
                    <img src="images/darwinbox.png" class="img-fluid" alt="logo">
                </div><br>
                <form class="rounded bg-white shadow p-5">
                    <h3 class="text-dark fw-bolder fs-4 mb-2">Two step verification</h3>
                    <div style="color: grey;">Enter the verification code we sent to</div><br>
                    <div style="color: black; font-size: 20px;">***** **@gmail.com</div><br>
                    <div class="otp_input text-start mb-2">
                        <label for="digit">Type your 6 digit security code
                        </label>
                        <div class="d-flex align-items-center justify-content-between mt-2">
                            <input type="text" class="form-control border border-primary" placeholder="">
                            <input type="text" class="form-control border border-primary" placeholder="">
                            <input type="text" class="form-control border border-primary" placeholder="">
                            <input type="text" class="form-control border border-primary" placeholder="">
                            <input type="text" class="form-control border border-primary" placeholder="">
                            <input type="text" class="form-control border border-primary" placeholder="">
                        </div>
                    </div>
                    <div>
                    <button type="submit" class="btn btn-primary submit_btn my-4">Submit</button>
                    </div>
                    Didn't get the code?
                    <a href="index.html" target="_blank" class="text-primary fw-bold text-decoration-none">Resend</a>
                    
                </form>
                
            </div>
        </div>
    </section>
</body>
</html>
