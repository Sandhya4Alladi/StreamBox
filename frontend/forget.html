<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <section class="wrapper" style="padding-top: 150px; padding-bottom: 250px;">
        <div class="container">
            <div class="col-sm-8 offset-sm-2 col-lg-6 offset-lg-3 col-xl-4 offset-xl-4 text-center">
                <div class="logo">
                    <img src="images/darwinbox.png" class="img-fluid" alt="logo">
                </div><br>
                <form class="rounded bg-white shadow p-5">
                    <h3 class="text-dark fw-bolder fs-4 mb-2">Forgot Password</h3><br>
                    <div style="color: grey;">Enter your mail to reset your password</div><br>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput"><i class="fa fa-envelope"></i>&nbsp; &nbsp;Email address</label>
                    </div>
                    <div>
                    <button type="submit" class="btn btn-primary submit_btn my-4">Submit</button>
                    <button type="submit" class="btn btn-primary submit_btn my-4 ms-3">Cancel</button>
                    </div>
                   
                    
                </form>
                
            </div>
        </div>
    </section>
</body>
</html>
